<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Consultant OS</title>
    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --primary: #1e3a8a;
            --primary-hover: #1e40af;
            --bg-page: #f8fafc;
            --bg-panel: #ffffff;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --border-color: #cbd5e1;
            --accent: #059669;
            --font-ui: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-page);
            color: var(--text-dark);
            line-height: 1.5;
        }

        /* --- Header --- */
        header {
            background-color: #0f172a;
            color: white;
            padding: 1.25rem 2rem;
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }

        header h1 { font-size: 1.5rem; font-weight: 600; }
        header p { font-size: 0.9rem; color: #94a3b8; margin-top: 0.25rem; }

        /* --- Layout Container --- */
        .container {
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
            max-width: 1500px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            height: calc(100vh - 150px);
        }

        /* --- Sidebar Controls --- */
        .sidebar {
            flex: 0 0 420px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section { display: flex; flex-direction: column; gap: 1rem; }
        .section-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--primary);
            border-bottom: 2px solid var(--bg-page);
            padding-bottom: 0.5rem;
        }

        .form-row { display: flex; gap: 1rem; }
        .form-group { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }

        label { font-size: 0.8rem; font-weight: 600; color: var(--text-light); text-transform: uppercase; }

        input[type="text"], select, textarea.input-area {
            width: 100%;
            padding: 0.6rem 0.75rem;
            font-family: inherit;
            font-size: 0.95rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus, textarea.input-area:focus {
            outline: none; border-color: var(--primary);
        }
        
        textarea.input-area { resize: vertical; min-height: 60px; }

        /* Scrolled Checkbox List for 20 Items */
        .checkbox-list { 
            display: flex; 
            flex-direction: column; 
            gap: 0.6rem; 
            max-height: 400px; 
            overflow-y: auto; 
            padding-right: 10px;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 6px;
            background-color: #f8fafc;
        }
        .checkbox-label {
            display: flex; align-items: flex-start; gap: 0.6rem; font-size: 0.9rem; cursor: pointer;
            padding-bottom: 0.3rem; border-bottom: 1px dashed #cbd5e1;
        }
        .checkbox-label:last-child { border-bottom: none; }
        .checkbox-label input { margin-top: 0.2rem; width: 1.1rem; height: 1.1rem; accent-color: var(--primary); flex-shrink: 0; }

        /* --- Document Preview Area --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-page);
            border-radius: var(--radius);
            overflow: hidden;
            min-width: 0;
        }

        .toolbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 1.5rem; background-color: white;
            border: 1px solid var(--border-color); border-radius: var(--radius) var(--radius) 0 0;
        }

        .badges { display: flex; gap: 0.5rem; }
        .badge { padding: 0.35rem 0.75rem; font-size: 0.75rem; font-weight: 700; border-radius: 20px; }
        .badge.type { background: #dbeafe; color: #1e40af; }
        .badge.lang { background: #e2e8f0; color: #475569; }

        .actions { display: flex; gap: 0.5rem; }
        button {
            padding: 0.6rem 1rem; font-weight: 600; border: none; border-radius: 4px; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem;
        }
        .btn-word { background-color: #2563eb; color: white; }
        .btn-word:hover { background-color: #1d4ed8; }
        .btn-pdf { background-color: #0f172a; color: white; }
        .btn-pdf:hover { background-color: #1e293b; }

        /* Paper Effect Wrapper */
        .editor-wrapper {
            flex: 1; overflow-y: auto; padding: 2rem;
            border: 1px solid var(--border-color); border-top: none;
            background-color: var(--bg-page);
        }

        div#documentEditor {
            background-color: white;
            width: 100%; max-width: 850px; margin: 0 auto;
            padding: 3rem 4rem;
            box-shadow: var(--shadow);
            border-radius: 4px;
            outline: none;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 1100px) {
            .container { flex-direction: column; height: auto; }
            .sidebar { flex: none; width: 100%; }
            .editor-wrapper { padding: 1rem; }
            div#documentEditor { padding: 2rem 1.5rem; }
        }
        @media (max-width: 600px) {
            .actions { flex-direction: column; }
            button { width: 100%; justify-content: center; }
            .toolbar { flex-direction: column; gap: 1rem; }
        }

        /* --- Print Styles --- */
        @media print {
            body, .editor-wrapper, .container { background: white !important; margin: 0; padding: 0; }
            header, .sidebar, .toolbar { display: none !important; }
            .container { display: block; max-width: 100%; height: auto; }
            .main-content { border: none; box-shadow: none; display: block; }
            div#documentEditor {
                padding: 0 !important; margin: 0 !important;
                box-shadow: none !important; width: 100% !important; max-width: 100% !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Healthcare Consultant OS</h1>
        <p>Advanced Proposal & Agreement Engine (20 Services)</p>
    </header>

    <div class="container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="section">
                <div class="section-title">1. Document Setup</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Type</label>
                        <select id="docType">
                            <option value="Proposal">Proposal</option>
                            <option value="Agreement">Legal Agreement</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Language</label>
                        <select id="docLang">
                            <option value="English">English</option>
                            <option value="Arabic">Arabic</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">2. Client Information</div>
                <div class="form-group">
                    <label>Client / Rep Name</label>
                    <input type="text" id="clientName" value="Dr. Ahmed Al Mansoori">
                </div>
                <div class="form-group">
                    <label>Facility Name</label>
                    <input type="text" id="facilityName" value="Al Shifa Advanced Polyclinic">
                </div>
                <div class="form-group">
                    <label>Facility Type</label>
                    <select id="facilityType">
                        <option value="Clinic">Clinic / Polyclinic</option>
                        <option value="Hospital">Hospital / Medical Center</option>
                    </select>
                </div>
            </div>

            <div class="section">
                <div class="section-title">3. Comprehensive Scope of Services</div>
                <div class="checkbox-list">
                    <!-- The Original 6 Services -->
                    <label class="checkbox-label"><input type="checkbox" id="srv_consult" checked> <span>Consultations & Needs Assessment</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_train" checked> <span>Staff & Leadership Training</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_restruct"> <span>Operational Restructuring</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_revenue" checked> <span>Revenue Growth Strategies</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_patient" checked> <span>Patient Volume Increase</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_profit"> <span>Profit Optimization & Auditing</span></label>
                    
                    <!-- The 4 Added Previously -->
                    <label class="checkbox-label"><input type="checkbox" id="srv_digital"> <span>Digital Transformation & Healthcare IT</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_quality"> <span>Quality Assurance & Accreditation (JCI)</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_recruit"> <span>Doctor Recruitment & Credentialing</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_px"> <span>Patient Experience (PX) Journey Mapping</span></label>

                    <!-- The 10 New Advanced Services -->
                    <label class="checkbox-label"><input type="checkbox" id="srv_rcm"> <span>Revenue Cycle Management (RCM) & Billing</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_marketing"> <span>Healthcare Marketing & Branding</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_gov"> <span>Clinical Governance & Risk Management</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_pricing"> <span>Pricing Strategy & Clinical Packaging</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_supply"> <span>Supply Chain & Procurement Optimization</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_telemed"> <span>Telemedicine & Virtual Care Integration</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_expansion"> <span>Expansion, Mergers & Acquisitions</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_data"> <span>Data Analytics & Business Intelligence</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_change"> <span>Organizational Change & Executive Coaching</span></label>
                    <label class="checkbox-label"><input type="checkbox" id="srv_facility"> <span>Facility Planning & Commissioning</span></label>
                </div>
            </div>

            <div class="section">
                <div class="section-title">4. Commercials & Payment Schedule</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Duration</label>
                        <input type="text" id="duration" value="6 Months">
                    </div>
                    <div class="form-group">
                        <label>Total Fee</label>
                        <input type="text" id="fee" value="70,000 AED">
                    </div>
                </div>
                <div class="form-group mt-2">
                    <label>Payment Schedule Details</label>
                    <textarea id="paymentSchedule" class="input-area">50% Advance Payment upon signing.
50% Upon completion of milestone 1.</textarea>
                </div>
            </div>
        </aside>

        <!-- Document Preview -->
        <main class="main-content">
            <div class="toolbar">
                <div class="badges">
                    <span class="badge type" id="badgeType">PROPOSAL</span>
                    <span class="badge lang" id="badgeLang">ENGLISH</span>
                </div>
                <div class="actions">
                    <button class="btn-word" onclick="exportToWord()">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="margin-right: 5px"><path d="M4.5 1a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V4.5L8.5 1h-4zM2 2a2 2 0 0 1 2-2h4.5L14 4.5V12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2zm5.5 0v2.5H10L7.5 2z"/></svg>
                        Download Word
                    </button>
                    <button class="btn-pdf" onclick="window.print()">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="margin-right: 5px"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
                        Save PDF / Print
                    </button>
                </div>
            </div>
            <div class="editor-wrapper">
                <div id="documentEditor" contenteditable="true" spellcheck="false"></div>
            </div>
        </main>
    </div>

    <script>
        // --- 1. System Logic & Dictionaries (20 Services) ---
        const scopeDictionary = {
            English: {
                srv_consult: "Strategic Healthcare Consultations & Comprehensive Facility Needs Assessment.",
                srv_train: "Advanced Staff, Clinical, and Executive Leadership Training & Capacity Building.",
                srv_restruct: "End-to-end Operational Restructuring to eliminate bottlenecks and optimize workflows.",
                srv_revenue: "Design, deployment, and tracking of Advanced Revenue Growth Strategies.",
                srv_patient: "Tactical marketing, outreach, and operational initiatives to systematically Increase Patient Volume.",
                srv_profit: "Financial Auditing, Cost Control measures, and Profit Margin Optimization.",
                srv_digital: "Digital Transformation, HIS/EMR System Optimization, and Healthcare IT Integration.",
                srv_quality: "Quality Assurance Implementation and Readiness for Accreditations (e.g., JCI, CBAHI, ISO).",
                srv_recruit: "Strategic Doctor Recruitment, Talent Acquisition, and Credentialing support.",
                srv_px: "Patient Experience (PX) Journey Mapping to maximize retention and satisfaction scores.",
                srv_rcm: "Revenue Cycle Management (RCM), Billing Optimization, and claims rejection reduction.",
                srv_marketing: "Healthcare Marketing, Branding Strategy, and targeted patient acquisition campaigns.",
                srv_gov: "Clinical Governance, Medical Risk Management, and patient safety protocols implementation.",
                srv_pricing: "Pricing Strategy, Competitive Analysis, and Clinical Packaging design.",
                srv_supply: "Supply Chain, Medical Procurement Optimization, and inventory waste reduction.",
                srv_telemed: "Telemedicine integration, Virtual Care operational setup, and digital health pathways.",
                srv_expansion: "Strategic Expansion planning, Mergers & Acquisitions support, and feasibility studies.",
                srv_data: "Healthcare Data Analytics, Business Intelligence (BI) dashboards, and performance tracking.",
                srv_change: "Organizational Change Management and Executive Coaching for healthcare leaders.",
                srv_facility: "Healthcare Facility Planning, equipment selection, and commissioning (Pre-opening phase)."
            },
            Arabic: {
                srv_consult: "استشارات استراتيجية متقدمة في الرعاية الصحية وتقييم الاحتياجات الشامل للمنشأة.",
                srv_train: "برامج تدريب وتطوير متكاملة وبناء قدرات للكوادر الطبية والقيادات التنفيذية.",
                srv_restruct: "إعادة هيكلة العمليات التشغيلية الشاملة للقضاء على المعوقات وتحسين كفاءة سير العمل.",
                srv_revenue: "تصميم وتنفيذ ومتابعة استراتيجيات متطورة ومبتكرة لنمو الإيرادات بشكل مستدام.",
                srv_patient: "مبادرات تشغيلية وتسويقية تكتيكية لزيادة حجم المراجعين وتحسين معدلات الاحتفاظ بهم.",
                srv_profit: "التدقيق المالي الشامل، إجراءات التحكم في التكاليف، وتحسين هوامش الربح التشغيلية.",
                srv_digital: "التحول الرقمي، تحسين أنظمة المعلومات الصحية (HIS/EMR)، وتكامل تكنولوجيا الرعاية الصحية.",
                srv_quality: "تطبيق معايير ضمان الجودة والتحضير للاعتمادات المحلية والدولية (مثل JCI، CBAHI، ISO).",
                srv_recruit: "الاستقطاب الاستراتيجي للأطباء والكفاءات، ودعم عمليات تقييم المؤهلات والترخيص.",
                srv_px: "هندسة رحلة وتجربة المريض (PX) لتعظيم مستويات الرضا والولاء للمنشأة.",
                srv_rcm: "إدارة دورة الإيرادات (RCM)، تحسين أنظمة الفوترة، وتقليل المرفوضات من التأمين.",
                srv_marketing: "استراتيجيات التسويق الطبي، بناء العلامة التجارية، وحملات استقطاب المرضى المستهدفة.",
                srv_gov: "تطبيق الحوكمة السريرية، إدارة المخاطر الطبية، وسياسات وممارسات سلامة المرضى.",
                srv_pricing: "استراتيجيات التسعير، تحليل المنافسين، وتصميم الباقات العلاجية الجذابة والتنافسية.",
                srv_supply: "إدارة سلسلة الإمداد، تحسين مشتريات المعدات والمستهلكات الطبية، وتقليل الهدر.",
                srv_telemed: "تأسيس ودمج خدمات الطب الاتصالي (التطبيب عن بعد) وتهيئة مسارات الرعاية الافتراضية.",
                srv_expansion: "استراتيجيات التوسع، الاندماج والاستحواذ، ودراسات الجدوى للأسواق والفروع الجديدة.",
                srv_data: "تحليل البيانات الصحية، ذكاء الأعمال (BI)، وتصميم لوحات تحكم لمتابعة الأداء.",
                srv_change: "إدارة التغيير المؤسسي، وتوجيه القيادات التنفيذية والطبية بسلاسة خلال فترات التحول.",
                srv_facility: "تخطيط وتجهيز المنشآت الطبية الجديدة، واختيار المعدات، وإدارة مرحلة ما قبل التشغيل."
            }
        };

        // Standard Inline CSS for Rich Text (Ensures it looks good in Web, PDF, and MS Word)
        const styles = {
            doc: "font-family: 'Georgia', 'Times New Roman', serif; color: #111; line-height: 1.8; font-size: 11pt;",
            headerBlock: "border-bottom: 2px solid #1e3a8a; padding-bottom: 15px; margin-bottom: 25px;",
            h1: "color: #1e3a8a; font-size: 18pt; font-weight: bold; margin: 0 0 10px 0; text-transform: uppercase;",
            h2: "color: #1e3a8a; font-size: 13pt; font-weight: bold; margin: 25px 0 10px 0; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;",
            p: "margin: 0 0 15px 0; text-align: justify;",
            ul: "margin: 0 0 15px 20px; padding: 0;",
            ulRtl: "margin: 0 20px 15px 0; padding: 0;",
            li: "margin-bottom: 8px;",
            bold: "font-weight: bold;",
            signatures: "width: 100%; margin-top: 50px; border-collapse: collapse;",
            sigTd: "width: 50%; padding-top: 10px; padding-bottom: 30px;"
        };

        // --- 2. Dynamic Document Generator ---
        function generateDocument() {
            const docType = document.getElementById('docType').value;
            const lang = document.getElementById('docLang').value;
            const clientName = document.getElementById('clientName').value || "[Client Name]";
            const facilityName = document.getElementById('facilityName').value || "[Facility Name]";
            const facilityType = document.getElementById('facilityType').value;
            const duration = document.getElementById('duration').value || "[Duration]";
            const fee = document.getElementById('fee').value || "[Fee Amount]";
            let paymentSchedule = document.getElementById('paymentSchedule').value || "To be agreed upon.";

            paymentSchedule = paymentSchedule.replace(/\n/g, '<br>');

            document.getElementById('badgeType').innerText = docType.toUpperCase();
            document.getElementById('badgeLang').innerText = lang.toUpperCase();

            const editor = document.getElementById('documentEditor');
            const isRTL = lang === 'Arabic';
            editor.dir = isRTL ? "rtl" : "ltr";
            
            // Build List of Selected Services
            const scopeKeys = Object.keys(scopeDictionary.English); // Grabs all 20 keys automatically
            let scopeItems = "";
            let count = 0;
            scopeKeys.forEach(key => {
                if (document.getElementById(key) && document.getElementById(key).checked) {
                    scopeItems += `<li style="${styles.li}">${scopeDictionary[lang][key]}</li>`;
                    count++;
                }
            });

            if (count === 0) {
                scopeItems = `<li style="${styles.li}">${lang === 'English' ? "Standard Healthcare Management Consulting Services." : "خدمات استشارات الإدارة الصحية القياسية."}</li>`;
            }

            const dateStr = new Date().toLocaleDateString(lang === 'English' ? 'en-US' : 'ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
            
            let html = `<div style="${styles.doc} direction: ${isRTL ? 'rtl' : 'ltr'}; text-align: ${isRTL ? 'right' : 'left'};">`;

            if (lang === 'English') {
                if (docType === 'Proposal') {
                    html += `
                        <div style="${styles.headerBlock}">
                            <h1 style="${styles.h1}">Proposal for Healthcare Facility Optimization</h1>
                            <p style="margin:0;"><strong>Date:</strong> ${dateStr}<br>
                            <strong>Prepared for:</strong> ${clientName}<br>
                            <strong>Facility:</strong> ${facilityName} (${facilityType})</p>
                        </div>

                        <h2 style="${styles.h2}">1. Executive Summary</h2>
                        <p style="${styles.p}">This proposal outlines a strategic partnership aimed at comprehensively elevating the operational, clinical, and financial performance of <strong>${facilityName}</strong>. Drawing upon extensive expertise in healthcare restructuring, training, and strategic development, this engagement focuses on driving measurable revenue growth, optimizing patient flow, and ensuring operational excellence.</p>

                        <h2 style="${styles.h2}">2. Strategic Objectives & Value Proposition</h2>
                        <ul style="${styles.ul}">
                            <li style="${styles.li}">Establish the facility as a market leader in quality of care and profitability.</li>
                            <li style="${styles.li}">Implement robust, agile operational frameworks that support sustainable scalability.</li>
                            <li style="${styles.li}">Enhance staff performance, retention, and patient satisfaction metrics.</li>
                        </ul>

                        <h2 style="${styles.h2}">3. Comprehensive Scope of Work</h2>
                        <p style="${styles.p}">Based on our preliminary assessment, we propose implementing the following strategic initiatives:</p>
                        <ul style="${styles.ul}">
                            ${scopeItems}
                        </ul>

                        <h2 style="${styles.h2}">4. Key Deliverables & Methodology</h2>
                        <p style="${styles.p}">Our methodology is data-driven and highly collaborative. We initiate with a <strong>Comprehensive Diagnostic Phase</strong> to identify operational leakages and growth opportunities. Following this, we deliver strategic blueprints, actionable recommendations, and hands-on implementation support. Progress will be tracked via strict Key Performance Indicators (KPIs) to ensure absolute attainment of goals.</p>

                        <h2 style="${styles.h2}">5. Commercials & Payment Schedule</h2>
                        <p style="${styles.p}"><strong>Estimated Project Duration:</strong> ${duration}<br>
                        <strong>Total Professional Investment:</strong> ${fee}</p>
                        <p style="${styles.p}"><strong>Payment Terms & Schedule:</strong><br>${paymentSchedule}</p>

                        <h2 style="${styles.h2}">6. Next Steps & Sign-off</h2>
                        <p style="${styles.p}">Upon your review and approval of this strategic proposal, a formal service agreement will be drafted to commence the engagement officially. We look forward to a successful partnership with <strong>${facilityName}</strong>.</p>
                        
                        <p style="${styles.p} margin-top: 40px;">
                            Respectfully submitted,<br><br>
                            _______________________<br>
                            <strong>[Your Name / Title]</strong><br>
                            Healthcare Strategic Consultant
                        </p>
                    `;
                } else if (docType === 'Agreement') {
                    html += `
                        <div style="${styles.headerBlock}">
                            <h1 style="${styles.h1}">Consulting Services Agreement</h1>

        // --- 3. Export to Microsoft Word (No External Libraries) ---
        function exportToWord() {
            const editor = document.getElementById('documentEditor');
            const docType = document.getElementById('docType').value;
            const clientName = document.getElementById('clientName').value.replace(/[^a-zA-Z0-9\u0600-\u06FF ]/g, "") || "Client"; // Allowed Arabic & English chars
            
            const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head><meta charset='utf-8'><title>Export HTML to Word</title></head><body>`;
            const footer = "</body></html>";
            
            let sourceHTML = header + editor.innerHTML + footer;
            
            const blob = new Blob(['\ufeff', sourceHTML], {
                type: 'application/msword'
            });
            
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${docType}_${clientName}.doc`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- 4. Event Listeners ---
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input, select, textarea');
            inputs.forEach(input => {
                input.addEventListener('input', generateDocument);
                input.addEventListener('change', generateDocument);
            });
            generateDocument();
        });
